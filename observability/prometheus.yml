# Prometheus configuration for CI/CD demo application observability.
# Update APP_IP and NODE_EXPORTER_IP to your host/private IPs.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert.rules.yml

scrape_configs:
  - job_name: app
    metrics_path: /metrics
    static_configs:
      - targets:
          - host.docker.internal:3000

  - job_name: node_exporter
    metrics_path: /metrics
    static_configs:
      - targets:
          - host.docker.internal:9100
